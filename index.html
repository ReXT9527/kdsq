<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kdsq 收藏页</title>
    <meta
      name="description"
      content="读取 GitHub 仓库中的 favorites.json，并在静态页面里展示收藏列表。"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      (function () {
        const bust = Date.now().toString(36);
        window.__KDSQ_ASSET_BUST__ = bust;

        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = `./styles.css?_=${bust}`;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">kdsq Favorites</p>
          <h1>收藏页</h1>
          <p class="hero-text">
            页面会优先读取当前 GitHub Pages 仓库里的
            <code>data/favorites.json</code>。如果你之前在这个浏览器里存过旧配置，现在也会自动尝试恢复。
          </p>
        </div>
        <div class="hero-stats">
          <div class="stat-card">
            <span class="stat-label">收藏数量</span>
            <strong id="favoriteCount">0</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">最后同步</span>
            <strong id="lastUpdated">未同步</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="panel settings-panel">
          <div class="panel-header">
            <h2>GitHub 配置</h2>
            <p>配置只保存在当前浏览器本地。公开仓库读取时可以不填 Token。</p>
          </div>

          <form id="configForm" class="config-form">
            <label>
              <span>GitHub Owner</span>
              <input id="githubOwner" name="githubOwner" autocomplete="off" required />
            </label>

            <label>
              <span>Repo</span>
              <input id="githubRepo" name="githubRepo" autocomplete="off" required />
            </label>

            <label>
              <span>Branch</span>
              <input id="githubBranch" name="githubBranch" autocomplete="off" />
            </label>

            <label>
              <span>Data Path</span>
              <input id="dataPath" name="dataPath" autocomplete="off" />
            </label>

            <label>
              <span>Fine-grained PAT</span>
              <input id="githubToken" name="githubToken" type="password" autocomplete="off" />
            </label>

            <div class="button-row">
              <button type="submit" class="primary">保存并读取</button>
              <button type="button" id="refreshButton" class="secondary">刷新</button>
              <button type="button" id="clearTokenButton" class="ghost">清空令牌</button>
              <button type="button" id="resetConfigButton" class="ghost">重置本地配置</button>
            </div>
          </form>

          <div id="statusBanner" class="status-banner" data-tone="neutral">
            正在准备读取配置。
          </div>
        </aside>

        <section class="panel content-panel">
          <div class="panel-header">
            <h2>收藏列表</h2>
            <p>支持关键字搜索和按版块筛选。</p>
          </div>

          <div class="toolbar">
            <label class="toolbar-field">
              <span>搜索标题</span>
              <input id="searchInput" type="search" placeholder="输入关键字" />
            </label>

            <label class="toolbar-field">
              <span>版块</span>
              <select id="forumFilter">
                <option value="">全部版块</option>
              </select>
            </label>
          </div>

          <div id="emptyState" class="empty-state">
            <h3>还没有可展示的收藏</h3>
            <p>如果脚本已经收藏过帖子，页面会从当前仓库的 <code>data/favorites.json</code> 自动读取。</p>
          </div>

          <div id="favoritesList" class="favorites-list" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const script = document.createElement('script');
        script.src = `./app.js?_=${window.__KDSQ_ASSET_BUST__ || Date.now().toString(36)}`;
        script.defer = true;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
